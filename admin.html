<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Admin Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>

<h2>Add Song</h2>
<input type="text" id="title" placeholder="Song title">
<input type="text" id="artist" placeholder="Artist">
<input type="text" id="url" placeholder="Cloudinary URL">
<button onclick="addSong()">Add Song</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = window.supabase.createClient(
  "https://imjbpevcswltjrkdtoca.supabase.co",
  "sb_publishable_xL7GQMqn7cD12FHDwQOW0A_v84SfiGr"
);

async function login() {
  const { error } = await supabase.auth.signInWithPassword({
    email: document.getElementById('email').value,
    password: document.getElementById('password').value
  });

  if (error) alert(error.message);
  else alert("Logged in!");
}

async function addSong() {
  const { error } = await supabase.from('songs').insert([
    {
      title: document.getElementById('title').value,
      artist: document.getElementById('artist').value,
      audio_url: document.getElementById('url').value
    }
  ]);

  if (error) alert(error.message);
  else alert("Song added!");
}
</script>

</body>
</html>
