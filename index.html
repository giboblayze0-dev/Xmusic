<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xmusic</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 20px;
    border-radius: 10px;
    border: none;
}

.song {
    margin: 20px;
}

.hidden {
    display: none;
}

button {
    padding: 10px 20px;
    background: orange;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Xmusic 🎵</h1>

<input type="text" id="search" placeholder="Search music...">

<!-- NEW MUSIC -->
<section id="new-music">
<h2>New Music</h2>

<div class="song">
<h3>Gibo Blayze - Yankha Phone</h3>
<img src="basi (1).jpg" height="200"><br><br>
<audio controls>
<source src="Gibo-Blayze-Yankha-PhoneProd.Tingset.mp3" type="audio/mpeg">
</audio><br>
<a href="Gibo-Blayze-Yankha-PhoneProd.Tingset.mp3" download>Download</a>
</div>

<div class="song">
<h3>Another Song</h3>
</div>

<button onclick="loadMore('new-music')">Load More</button>
</section>

<!-- TRENDING -->
<section id="trending-music">
<h2>Trending Music</h2>

<div class="song">
<h3>Gibo Blayze - Why Me</h3>
<img src="basi (1).jpg" height="200"><br><br>
<audio controls>
<source src="Gibo-Blayze-Why-MeProd.Tingset.mp3" type="audio/mpeg">
</audio><br>
<a href="Gibo-Blayze-Why-MeProd.Tingset.mp3" download>Download</a>
</div>

<button onclick="loadMore('trending-music')">Load More</button>
</section>

<!-- ALBUM -->
<section id="album-music">
<h2>Album</h2>

<div class="song">
<h3>Gibo Blayze - Ndatopa Ine</h3>
<img src="basi (1).jpg" height="200"><br><br>
<audio controls>
<source src="Gibo-Blayze-Ndatopa-IneProd.Tingset.mp3" type="audio/mpeg">
</audio><br>
<a href="Gibo-Blayze-Ndatopa-IneProd.Tingset.mp3" download>Download</a>
</div>

<button onclick="loadMore('album-music')">Load More</button>
</section>

<script>
// SEARCH FUNCTION
document.getElementById("search").addEventListener("keyup", function () {
    let value = this.value.toLowerCase();
    let songs = document.querySelectorAll(".song");

    songs.forEach(song => {
        let text = song.textContent.toLowerCase();

        if (text.includes(value)) {
            song.style.display = "";
        } else {
            song.style.display = "none";
        }
    });
});

// SETUP SECTIONS (HIDE AFTER 5)
function setupSection(sectionId) {
    let songs = document.querySelectorAll(`#${sectionId} .song`);

    songs.forEach((song, index) => {
        if (index >= 5) {
            song.classList.add("hidden");
        }
    });
}

// LOAD MORE BUTTON
function loadMore(sectionId) {
    let hiddenSongs = document.querySelectorAll(`#${sectionId} .hidden`);

    for (let i = 0; i < 5 && i < hiddenSongs.length; i++) {
        hiddenSongs[i].classList.remove("hidden");
    }
}

// RUN ON LOAD
setupSection("new-music");
setupSection("trending-music");
setupSection("album-music");
</script>

</body>
</html>
