<!DOCTYPE html>
<html>
<head>
<title>Search Music</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
  <input type="text" id="search" placeholder="Search music..." onkeyup="searchSongs()">

<div id="results"></div>

<script src="search.js"></script>
<script>
const songs = [

{
title: "Why-Me",
artist: "Gibo-Blayze",
image: "xmusic/image_basi (1).jpg",
audio: "xmusic/Gibo-Blayze-Why-MeProd.Tingset.mp3"
},

{
title: "Yankha-Phone",
artist: "Gibo-Blayze",
image: "xmusic/basi (1).jpg",
audio: "xmusic/Gibo-Blayze-Yankha-Phoneprod.Tingset.mp3"
},

{
title: "Ndatopa-Ine",
artist: "Gibo-Blayze",
image: "xbasi (1).jpg",
audio: "xmusic/Gibo-Blayze-Ndatopa-Ineprod.Tingset.mp3"
}

];


function searchSongs(){

let input = document.getElementById("search").value.toLowerCase();
let results = document.getElementById("results");

results.innerHTML="";

songs.forEach(song=>{

if(song.title.toLowerCase().includes(input) || song.artist.toLowerCase().includes(input)){

results.innerHTML += `

<div class="song">

<img src="${song.image}" width="120">

<h3>${song.title}</h3>

<p>${song.artist}</p>

<audio controls src="${song.audio}"></audio>

<br>

<a href="${song.audio}" download>Download</a>

</div>

`;
}
});
}
</script>

</body>
</html>
